<!DOCTYPE html>
<html>
<head>
    <title>Verify OTP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Background */
        body {
            margin:0;
            height:100vh;
            font-family:'Segoe UI', sans-serif;
            background:url('https://images.unsplash.com/photo-1474487548417-781cb71495f3?auto=format&fit=crop&w=1920&q=80') no-repeat center/cover;
        }

        .overlay {
            position:fixed;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.6);
        }

        .card {
            position:absolute;
            top:50%; left:50%;
            transform:translate(-50%,-50%);
            width:90%; max-width:350px;
            padding:40px;
            background:rgba(255,255,255,0.1);
            backdrop-filter:blur(15px);
            border-radius:15px;
            text-align:center;
            color:white;
        }

        input {
            width:100%;
            padding:12px;
            margin:10px 0;
            border-radius:8px;
            border:none;
            outline:none;
        }

        button {
            width:100%;
            padding:12px;
            background:linear-gradient(135deg,#00cec9,#0984e3);
            border:none;
            color:white;
            font-weight:bold;
            border-radius:8px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .otp-box {
            background:#00000080;
            padding:10px;
            border-radius:8px;
            margin-bottom:15px;
        }

        .error {
            color:#ff7675;
            margin:10px 0;
        }

        a { color:#00cec9; text-decoration:none; }

        /* Success message */
        .success-msg {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg,#00cec9,#0984e3);
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            opacity: 0;
            pointer-events: none;
            transform: translateY(-20px);
            transition: all 0.5s ease-in-out;
            z-index: 9999;
        }
        .success-msg.show { opacity:1; transform:translateY(0); }
    </style>
</head>
<body>
<div class="overlay"></div>

<div class="card">
    <h2>🔐 Verify OTP</h2>

    {% if otp %}
    <div class="otp-box">
        Your OTP (for demo): <b>{{ otp }}</b>
    </div>
    {% endif %}

    <form method="POST" action="/verify-otp/">
        {% csrf_token %}
        <input type="text" name="otp" placeholder="Enter OTP" required>
        <button>Verify</button>
    </form>

    <p class="error">{{ error }}</p>
    <p><a href="/register/">Back to Register</a></p>
</div>

<div id="success-msg" class="success-msg"></div>

<script>
function showSuccessMessage(text) {
    const msg = document.getElementById('success-msg');
    msg.textContent = "🎉 " + text;
    msg.classList.add('show');
    setTimeout(() => msg.classList.remove('show'), 3000);
}

// Optional: show success if redirected from OTP verified
const params = new URLSearchParams(window.location.search);
if(params.get('registered')==='true'){ showSuccessMessage("Account created successfully!"); }
</script>
</body>
</html>
