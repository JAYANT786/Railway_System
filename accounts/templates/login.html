<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* Reset & Body */
body {
    margin:0;
    height:100vh;
    font-family:'Segoe UI', sans-serif;
    background: url('https://images.unsplash.com/photo-1508881598043-7ca4e6db0e23?auto=format&fit=crop&w=1920&q=80') no-repeat center/cover;
    position: relative;
}
.overlay {
    position: fixed;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.6);
    z-index: 0;
}

/* Card */
.card {
    position: absolute;
    top:50%;
    left:50%;
    transform: translate(-50%, -50%);
    width:90%;
    max-width: 350px;
    padding: 40px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    border-radius: 15px;
    text-align: center;
    color: white;
    z-index: 1;
    animation: fadeIn 1s ease-in;
}
@keyframes fadeIn {
    from {opacity:0; transform: translateY(-20px);}
    to {opacity:1; transform: translateY(0);}
}

/* Input Fields */
input {
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:none;
    outline:none;
    background: rgba(255,255,255,0.2);
    color: white;
    font-size: 14px;
}
input::placeholder {
    color: #eee;
}

/* Button */
button {
    width:100%;
    padding:12px;
    background: linear-gradient(135deg,#00cec9,#0984e3);
    border:none;
    color:white;
    font-weight:bold;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
    font-size: 16px;
}
button:hover {
    transform: scale(1.05);
    box-shadow: 0 5px 15px rgba(0,140,220,0.4);
}

/* Links */
a {
    color:#00cec9;
    text-decoration:none;
    font-size: 14px;
}
a:hover {
    text-decoration: underline;
}

/* Error / Alert Messages */
.alert {
    padding: 10px 20px;
    border-radius: 8px;
    margin-bottom: 15px;
    font-weight: 600;
    font-size: 14px;
    text-align: center;
}
.alert.success { background: #d4edda; color: #155724; }
.alert.error { background: #f8d7da; color: #721c24; }

/* Success message animation */
.success-msg {
    position: fixed;
    top: 20px;
    right: 20px;
    background: linear-gradient(135deg,#00cec9,#0984e3);
    color: white;
    padding: 15px 25px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    opacity: 0;
    pointer-events: none;
    transform: translateY(-20px);
    transition: all 0.5s ease-in-out;
    z-index: 9999;
}
.success-msg.show {
    opacity: 1;
    transform: translateY(0);
}

/* Responsive */
@media(max-width: 480px){
    .card {padding:30px;}
    input, button {font-size: 14px;}
    a {font-size: 13px;}
}
</style>
</head>
<body>

<div class="overlay"></div>

<div class="card">
    <h2>🚆 Login</h2>

    <!-- Django messages -->
    {% if messages %}
      {% for message in messages %}
        <div class="alert {% if message.tags %}{{ message.tags }}{% endif %}">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button>Login</button>
    </form>

    <p><a href="/forgot/">Forgot Password?</a></p>
    <p><a href="/register/">Create Account</a></p>
    <p class="error">{{ error }}</p>
</div>

<!-- Optional JS for animated success popup -->
<div id="success-msg" class="success-msg"></div>
<script>
document.querySelectorAll('.alert.success').forEach(msg => {
    msg.classList.add('show');
    setTimeout(() => msg.classList.remove('show'), 3000);
});
</script>

</body>
</html>
